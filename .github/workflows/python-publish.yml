name: Publish Python package

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]  # Встановлює пакет і dev-залежності (включно з pytest)
      - name: Run tests
        run: pytest

  pypi-publish:
    needs: test
    name: Upload to PyPI
    runs-on: ubuntu-latest
    environment: pypi  # Має збігатися з назвою у налаштуваннях PyPI
    permissions:
      id-token: write  # Обов'язково для Trusted Publishing
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build package
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
