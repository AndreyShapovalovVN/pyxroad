name: Publish Python package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # Обов'язково для Trusted Publishing

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .  # Встановлює пакет та залежності з pyproject.toml
      - name: Run tests
        run: pytest

  pypi-publish:
    needs: test
    name: Upload to PyPI
    runs-on: ubuntu-latest
    environment: pypi  # Має збігатися з назвою у налаштуваннях PyPI
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: |
          pip install build
      - name: Build package
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1